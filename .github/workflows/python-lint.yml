name: Python Linter

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flake8
        run: pip install flake8
      - name: Run Linter
        run: flake8 main.py
